<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pagamento - Studio Waleska</title>
  <!-- Usa API do Google Charts para gerar QR Code da chave (opcional) -->
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #f8f0e7, #f0e6dc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      max-width: 450px;
      width: 100%;
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: #d4af37;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .cliente {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    .valor {
      font-size: 36px;
      font-weight: 700;
      color: #d4af37;
      margin: 10px 0 20px;
    }
    .chave-area {
      background: #f5f0ea;
      padding: 14px;
      border-radius: 12px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 18px;
      font-family: monospace;
      color: #333;
      border: 1px solid #e0ddd8;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .chave-area span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #888;
      margin-bottom: 4px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .qr-code {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid #f0ece6;
      margin: 0 auto 20px;
      width: 220px;
      height: 220px;
    }
    #qrCode {
      width: 200px;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrCode img {
      width: 100% !important;
      height: 100% !important;
    }
    .btn-copiar {
      background: #d4af37;
      color: #fff;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      margin-top: 5px;
    }
    .btn-copiar:hover {
      background: #b8942a;
      transform: scale(1.02);
    }
    .btn-copiar.copiado {
      background: #4caf50;
    }
    .instrucoes {
      color: #777;
      font-size: 13px;
      margin-top: 15px;
      line-height: 1.6;
    }
    .instrucoes strong {
      color: #333;
    }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✨ Studio Waleska</div>
    <div class="subtitle">Pagamento do sinal</div>

    <div class="cliente" id="clienteNome">Cliente</div>
    <div class="valor" id="valorPix">R$ 0,00</div>

    <!-- Exibe a chave PIX -->
    <div class="chave-area" id="chavePix">
      <span>📌 Copie a chave abaixo:</span>
      <span id="chaveValor">59591030000162</span>
    </div>

    <!-- QR Code da chave (opcional, mas útil) -->
    <div class="qr-code">
      <div id="qrCode"><span style="color:#999;">⏳ Carregando...</span></div>
    </div>

    <button class="btn-copiar" id="btnCopiar" onclick="copiarChave()">
      📋 Copiar chave PIX
    </button>

    <div class="instrucoes">
      1. Clique em <strong>"Copiar chave PIX"</strong><br>
      2. Abra o app do seu banco<br>
      3. Escolha <strong>"Pagar com PIX"</strong><br>
      4. Cole a chave e confirme o <strong>valor acima</strong>
    </div>

    <div class="footer">
      Qualquer dúvida, fale com Waleska pelo WhatsApp
    </div>
  </div>

  <script>
    // ===== LER PARÂMETROS =====
    const urlParams = new URLSearchParams(window.location.search);
    let valor = urlParams.get('valor') || '0.00';
    valor = valor.replace(',', '.');
    const cliente = decodeURIComponent(urlParams.get('cliente') || 'Cliente');
    const chavePix = urlParams.get('chave') || '59591030000162';

    // ===== EXIBIR DADOS =====
    document.getElementById('clienteNome').textContent = 'Olá, ' + cliente + '!';
    document.getElementById('valorPix').textContent = 'R$ ' + parseFloat(valor).toFixed(2).replace('.', ',');
    document.getElementById('chaveValor').textContent = chavePix;

    // ===== GERAR QR CODE DA CHAVE (USANDO API DO GOOGLE) =====
    function gerarQRCode(texto) {
      const qrContainer = document.getElementById('qrCode');
      const url = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(texto);
      const img = document.createElement('img');
      img.src = url;
      img.alt = 'QR Code PIX';
      img.style.width = '200px';
      img.style.height = '200px';
      img.onerror = function() {
        qrContainer.innerHTML = '<span style="color:#999;">QR Code indisponível</span>';
      };
      qrContainer.innerHTML = '';
      qrContainer.appendChild(img);
    }

    gerarQRCode(chavePix);

    // ===== COPIAR CHAVE =====
    function copiarChave() {
      const chave = document.getElementById('chaveValor').textContent;
      if (!chave) {
        alert('⚠️ Chave PIX indisponível.');
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(chave).then(() => {
          const btn = document.getElementById('btnCopiar');
          btn.textContent = '✅ Copiado!';
          btn.classList.add('copiado');
          setTimeout(() => {
            btn.textContent = '📋 Copiar chave PIX';
            btn.classList.remove('copiado');
          }, 3000);
        }).catch(() => {
          copiarFallback(chave);
        });
      } else {
        copiarFallback(chave);
      }
    }

    function copiarFallback(chave) {
      const textarea = document.createElement('textarea');
      textarea.value = chave;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        alert('✅ Chave copiada!');
      } catch (e) {
        alert('⚠️ Selecione a chave acima e copie manualmente.');
      }
      document.body.removeChild(textarea);
    }
  </script>
</body>
</html>
