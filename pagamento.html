<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pagamento - Studio Waleska</title>
  <!-- Carrega as bibliotecas de forma mais confiável -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-pix@1.0.0/dist/qrcode-pix.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #f8f0e7, #f0e6dc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      max-width: 450px;
      width: 100%;
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: #d4af37;
      margin-bottom: 5px;
    }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
    .cliente { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 5px; }
    .valor { font-size: 36px; font-weight: 700; color: #d4af37; margin: 10px 0 20px; }
    .qr-code {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: inline-block;
      border: 2px solid #f0ece6;
      margin-bottom: 20px;
      min-height: 220px;
      min-width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrCode { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; }
    #qrCode img { width: 100% !important; height: 100% !important; }
    #qrCode canvas { width: 100% !important; height: 100% !important; }
    .codigo-area {
      background: #f5f0ea;
      padding: 14px;
      border-radius: 12px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 12px;
      font-family: monospace;
      color: #333;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      border: 1px solid #e0ddd8;
    }
    .btn-copiar {
      background: #d4af37;
      color: #fff;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      margin-top: 5px;
    }
    .btn-copiar:hover { background: #b8942a; transform: scale(1.02); }
    .btn-copiar.copiado { background: #4caf50; }
    .instrucoes { color: #777; font-size: 13px; margin-top: 15px; line-height: 1.6; }
    .instrucoes strong { color: #333; }
    .footer { margin-top: 20px; font-size: 12px; color: #aaa; border-top: 1px solid #eee; padding-top: 15px; }
    .carregando {
      color: #999;
      font-size: 14px;
      padding: 20px;
    }
    .erro {
      color: #c0392b;
      font-size: 14px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✨ Studio Waleska</div>
    <div class="subtitle">Pagamento via PIX</div>

    <div class="cliente" id="clienteNome">Cliente</div>
    <div class="valor" id="valorPix">R$ 0,00</div>

    <div class="qr-code" id="qrContainer">
      <div id="qrCode" class="carregando">⏳ Gerando QR Code...</div>
    </div>

    <div class="codigo-area" id="codigoPix">
      ⏳ Gerando código PIX...
    </div>

    <button class="btn-copiar" id="btnCopiar" onclick="copiarPix()">
      📋 Copiar código PIX
    </button>

    <div class="instrucoes">
      1. Copie o código acima<br>
      2. Abra o app do seu banco<br>
      3. Cole na opção <strong>"PIX Copia e Cola"</strong><br>
      4. Confirme o pagamento
    </div>

    <div class="footer">
      Qualquer dúvida, fale com Waleska pelo WhatsApp
    </div>
  </div>

  <script>
    // ========== LER PARÂMETROS DA URL ==========
    function getParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // Aguarda o DOM carregar completamente
    document.addEventListener('DOMContentLoaded', function() {
      // Pega os parâmetros
      let valor = getParam('valor') || '0.00';
      // Converte vírgula para ponto (caso venha com vírgula)
      valor = valor.replace(',', '.');
      const cliente = decodeURIComponent(getParam('cliente') || 'Cliente');
      const chavePix = getParam('chave') || '59591030000162';
      const nomePix = getParam('nome') || 'Syanne Waleska Gomes dos Santos';

      // Exibe o nome e valor
      document.getElementById('clienteNome').textContent = `Olá, ${cliente}!`;
      document.getElementById('valorPix').textContent = `R$ ${valor.replace('.', ',')}`;

      const valorNumerico = parseFloat(valor);
      const codigoPixEl = document.getElementById('codigoPix');
      const qrCodeEl = document.getElementById('qrCode');
      const qrContainer = document.getElementById('qrContainer');

      // Verifica se o valor é válido
      if (isNaN(valorNumerico) || valorNumerico <= 0) {
        codigoPixEl.textContent = '❌ Valor inválido.';
        qrCodeEl.innerHTML = '<span class="erro">Valor inválido</span>';
        return;
      }

      // ========== GERAR PAYLOAD PIX ==========
      let payload = '';
      try {
        // Verifica se a biblioteca QRCodePix está disponível
        if (typeof QRCodePix !== 'undefined') {
          payload = QRCodePix.generate({
            pixKey: chavePix,
            merchantName: nomePix,
            amount: valorNumerico.toFixed(2),
            city: 'Joinville',
          });
          codigoPixEl.textContent = payload;
        } else {
          codigoPixEl.textContent = '⚠️ Biblioteca não carregada. Recarregue a página.';
          qrCodeEl.innerHTML = '<span class="erro">Erro ao carregar biblioteca</span>';
          return;
        }
      } catch (e) {
        codigoPixEl.textContent = '❌ Erro ao gerar código PIX. Tente novamente.';
        qrCodeEl.innerHTML = '<span class="erro">Erro ao gerar código</span>';
        console.error('Erro ao gerar PIX:', e);
        return;
      }

      // ========== GERAR QR CODE ==========
      try {
        // Verifica se a biblioteca QRCode está disponível
        if (typeof QRCode !== 'undefined' && payload && payload.length > 10) {
          // Limpa o conteúdo anterior
          qrCodeEl.innerHTML = '';
          
          // Cria o QR Code
          new QRCode(qrCodeEl, {
            text: payload,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H,
          });
          
          // Remove a classe de carregamento
          qrCodeEl.classList.remove('carregando');
        } else {
          qrCodeEl.innerHTML = '<span class="erro">⚠️ QR Code indisponível</span>';
        }
      } catch (e) {
        qrCodeEl.innerHTML = '<span class="erro">❌ Erro ao gerar QR Code</span>';
        console.error('Erro ao gerar QR Code:', e);
      }
    });

    // ========== FUNÇÃO COPIAR ==========
    function copiarPix() {
      const codigo = document.getElementById('codigoPix').textContent;
      if (!codigo || codigo.includes('⏳') || codigo.includes('Erro') || codigo.includes('inválido')) {
        alert('⚠️ Código PIX indisponível. Tente novamente.');
        return;
      }

      navigator.clipboard.writeText(codigo).then(() => {
        const btn = document.getElementById('btnCopiar');
        btn.textContent = '✅ Copiado!';
        btn.classList.add('copiado');
        setTimeout(() => {
          btn.textContent = '📋 Copiar código PIX';
          btn.classList.remove('copiado');
        }, 3000);
      }).catch(() => {
        // Fallback para celulares
        const textarea = document.createElement('textarea');
        textarea.value = codigo;
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          alert('✅ Código copiado!');
        } catch (e) {
          alert('⚠️ Copie manualmente: selecione o código acima e copie.');
        }
        document.body.removeChild(textarea);
      });
    }
  </script>
</body>
</html>
