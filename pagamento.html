<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pagamento - Studio Waleska</title>
  <!-- Carrega a biblioteca qrcode-pix (geração de payload) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-pix@1.0.0/dist/qrcode-pix.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #f8f0e7, #f0e6dc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      max-width: 450px;
      width: 100%;
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: #d4af37;
      margin-bottom: 5px;
    }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
    .cliente { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 5px; }
    .valor { font-size: 36px; font-weight: 700; color: #d4af37; margin: 10px 0 20px; }
    .qr-code {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: inline-block;
      border: 2px solid #f0ece6;
      margin-bottom: 20px;
      min-height: 220px;
      min-width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrCode { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; }
    #qrCode img { width: 100% !important; height: 100% !important; }
    .codigo-area {
      background: #f5f0ea;
      padding: 14px;
      border-radius: 12px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 12px;
      font-family: monospace;
      color: #333;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      border: 1px solid #e0ddd8;
    }
    .btn-copiar {
      background: #d4af37;
      color: #fff;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      margin-top: 5px;
    }
    .btn-copiar:hover { background: #b8942a; transform: scale(1.02); }
    .btn-copiar.copiado { background: #4caf50; }
    .instrucoes { color: #777; font-size: 13px; margin-top: 15px; line-height: 1.6; }
    .instrucoes strong { color: #333; }
    .footer { margin-top: 20px; font-size: 12px; color: #aaa; border-top: 1px solid #eee; padding-top: 15px; }
    .carregando { color: #999; font-size: 14px; padding: 20px; }
    .erro { color: #c0392b; font-size: 14px; padding: 10px; }
    .sucesso { color: #4caf50; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✨ Studio Waleska</div>
    <div class="subtitle">Pagamento via PIX</div>

    <div class="cliente" id="clienteNome">Cliente</div>
    <div class="valor" id="valorPix">R$ 0,00</div>

    <div class="qr-code">
      <div id="qrCode"><span class="carregando">⏳ Gerando QR Code...</span></div>
    </div>

    <div class="codigo-area" id="codigoPix">
      ⏳ Gerando código PIX...
    </div>

    <button class="btn-copiar" id="btnCopiar" onclick="copiarPix()">
      📋 Copiar código PIX
    </button>

    <div class="instrucoes">
      1. Copie o código acima<br>
      2. Abra o app do seu banco<br>
      3. Cole na opção <strong>"PIX Copia e Cola"</strong><br>
      4. Confirme o pagamento
    </div>

    <div class="footer">
      Qualquer dúvida, fale com Waleska pelo WhatsApp
    </div>
  </div>

  <script>
    (function() {
      // ========== GERADOR MANUAL DE PAYLOAD (FALLBACK) ==========
      function gerarPayloadManual(chave, nome, valor, cidade) {
        // Função CRC16 (padrão BR Code)
        function crc16(hex) {
          let crc = 0xFFFF;
          const bytes = [];
          for (let i = 0; i < hex.length; i += 2) {
            bytes.push(parseInt(hex.substr(i, 2), 16));
          }
          for (let i = 0; i < bytes.length; i++) {
            crc ^= bytes[i] << 8;
            for (let j = 0; j < 8; j++) {
              if (crc & 0x8000) {
                crc = (crc << 1) ^ 0x1021;
              } else {
                crc = crc << 1;
              }
              crc &= 0xFFFF;
            }
          }
          return crc.toString(16).toUpperCase().padStart(4, '0');
        }

        function criarCampo(id, valor) {
          const str = String(valor);
          const len = String(str.length).padStart(2, '0');
          return id + len + str;
        }

        // Limpa e encurta nome/cidade
        function limparTexto(texto, max) {
          return texto
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-zA-Z0-9 ]/g, '')
            .trim()
            .substring(0, max);
        }

        const nomeLimpo = limparTexto(nome, 23) || 'Studio';
        const cidadeLimpa = limparTexto(cidade, 15) || 'Joinville';

        // Detecta tipo de chave: 01 = CPF (11 dígitos), 02 = CNPJ (14 dígitos)
        const chaveLimpa = chave.replace(/\D/g, '');
        let tipoChave = '01';
        if (chaveLimpa.length === 14) tipoChave = '02';
        else if (chaveLimpa.length === 11) tipoChave = '01';
        else tipoChave = '01'; // fallback

        let payload = '';
        payload += '000201'; // Payload Format Indicator
        const gui = '0014br.gov.bcb.pix';
        const chaveFormatada = tipoChave + String(chaveLimpa.length).padStart(2, '0') + chaveLimpa;
        const merchantInfo = gui + chaveFormatada;
        payload += criarCampo('26', merchantInfo);
        payload += '52040000'; // MCC
        payload += '5303986'; // BRL
        payload += criarCampo('54', valor.toFixed(2));
        payload += '5802BR';
        payload += criarCampo('59', nomeLimpo);
        payload += criarCampo('60', cidadeLimpa);
        // Campo 62 com referência '***'
        const ref = '***';
        const campo05 = criarCampo('05', ref);
        payload += criarCampo('62', campo05);
        // CRC16
        const crc = crc16(payload + '6304');
        payload += '6304' + crc;
        return payload;
      }

      // ========== FUNÇÃO PARA GERAR QR CODE ==========
      function gerarQRCode(texto, elemento) {
        // Usa a API do qrserver.com
        const url = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(texto);
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'QR Code PIX';
        img.style.width = '200px';
        img.style.height = '200px';
        img.onerror = function() {
          elemento.innerHTML = '<span class="erro">❌ Erro ao carregar QR Code.</span>';
        };
        elemento.innerHTML = '';
        elemento.appendChild(img);
        return true;
      }

      // ========== CARREGAR DADOS ==========
      document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        let valor = urlParams.get('valor') || '0.00';
        valor = valor.replace(',', '.');
        const cliente = decodeURIComponent(urlParams.get('cliente') || 'Cliente');
        const chavePix = urlParams.get('chave') || '59591030000162';
        const nomePix = urlParams.get('nome') || 'Syanne Waleska Gomes dos Santos';

        document.getElementById('clienteNome').textContent = 'Olá, ' + cliente + '!';
        document.getElementById('valorPix').textContent = 'R$ ' + valor.replace('.', ',');

        const valorNumerico = parseFloat(valor);
        const codigoPixEl = document.getElementById('codigoPix');
        const qrCodeEl = document.getElementById('qrCode');

        if (isNaN(valorNumerico) || valorNumerico <= 0) {
          codigoPixEl.textContent = '❌ Valor inválido.';
          qrCodeEl.innerHTML = '<span class="erro">Valor inválido</span>';
          return;
        }

        // ===== TENTA USAR BIBLIOTECA QRCODEPIX =====
        let payload = null;
        try {
          if (typeof QRCodePix !== 'undefined' && QRCodePix.generate) {
            payload = QRCodePix.generate({
              pixKey: chavePix,
              merchantName: nomePix,
              amount: valorNumerico.toFixed(2),
              city: 'Joinville'
            });
          }
        } catch (e) {
          console.warn('Biblioteca QRCodePix falhou:', e);
        }

        // ===== FALLBACK: GERADOR MANUAL =====
        if (!payload) {
          console.log('Usando gerador manual para payload');
          payload = gerarPayloadManual(chavePix, nomePix, valorNumerico, 'Joinville');
        }

        if (!payload) {
          codigoPixEl.textContent = '❌ Erro ao gerar código PIX.';
          qrCodeEl.innerHTML = '<span class="erro">Erro ao gerar</span>';
          return;
        }

        codigoPixEl.textContent = payload;
        gerarQRCode(payload, qrCodeEl);
      });
    })();

    // ========== FUNÇÃO COPIAR ==========
    function copiarPix() {
      const codigo = document.getElementById('codigoPix').textContent;
      if (!codigo || codigo.includes('⏳') || codigo.includes('Erro') || codigo.includes('inválido')) {
        alert('⚠️ Código PIX indisponível. Tente novamente.');
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(codigo).then(() => {
          const btn = document.getElementById('btnCopiar');
          btn.textContent = '✅ Copiado!';
          btn.classList.add('copiado');
          setTimeout(() => {
            btn.textContent = '📋 Copiar código PIX';
            btn.classList.remove('copiado');
          }, 3000);
        }).catch(() => {
          copiarFallback(codigo);
        });
      } else {
        copiarFallback(codigo);
      }
    }

    function copiarFallback(codigo) {
      const textarea = document.createElement('textarea');
      textarea.value = codigo;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        alert('✅ Código copiado!');
      } catch (e) {
        alert('⚠️ Selecione o código acima e copie manualmente.');
      }
      document.body.removeChild(textarea);
    }
  </script>
</body>
</html>
