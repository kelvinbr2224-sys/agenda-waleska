<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pagamento - Studio Waleska</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #f8f0e7, #f0e6dc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      max-width: 450px;
      width: 100%;
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: #d4af37;
      margin-bottom: 5px;
    }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
    .cliente { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 5px; }
    .valor { font-size: 36px; font-weight: 700; color: #d4af37; margin: 10px 0 20px; }
    .qr-code {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: inline-block;
      border: 2px solid #f0ece6;
      margin-bottom: 20px;
      min-height: 220px;
      min-width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrCode { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; }
    #qrCode img { width: 100% !important; height: 100% !important; }
    .codigo-area {
      background: #f5f0ea;
      padding: 14px;
      border-radius: 12px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 12px;
      font-family: monospace;
      color: #333;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      border: 1px solid #e0ddd8;
    }
    .btn-copiar {
      background: #d4af37;
      color: #fff;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      margin-top: 5px;
    }
    .btn-copiar:hover { background: #b8942a; transform: scale(1.02); }
    .btn-copiar.copiado { background: #4caf50; }
    .instrucoes { color: #777; font-size: 13px; margin-top: 15px; line-height: 1.6; }
    .instrucoes strong { color: #333; }
    .footer { margin-top: 20px; font-size: 12px; color: #aaa; border-top: 1px solid #eee; padding-top: 15px; }
    .carregando { color: #999; font-size: 14px; padding: 20px; }
    .erro { color: #c0392b; font-size: 14px; padding: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✨ Studio Waleska</div>
    <div class="subtitle">Pagamento via PIX</div>

    <div class="cliente" id="clienteNome">Cliente</div>
    <div class="valor" id="valorPix">R$ 0,00</div>

    <div class="qr-code">
      <div id="qrCode"><span class="carregando">⏳ Gerando QR Code...</span></div>
    </div>

    <div class="codigo-area" id="codigoPix">
      ⏳ Gerando código PIX...
    </div>

    <button class="btn-copiar" id="btnCopiar" onclick="copiarPix()">
      📋 Copiar código PIX
    </button>

    <div class="instrucoes">
      1. Copie o código acima<br>
      2. Abra o app do seu banco<br>
      3. Cole na opção <strong>"PIX Copia e Cola"</strong><br>
      4. Confirme o pagamento
    </div>

    <div class="footer">
      Qualquer dúvida, fale com Waleska pelo WhatsApp
    </div>
  </div>

  <script>
    // ========== GERADOR DE PAYLOAD PIX CORRETO ==========
    function gerarPayloadPIX(chave, nome, valor, cidade) {
        if (!chave || !nome || !valor || valor <= 0) {
            return null;
        }

        // ===== FUNÇÃO CRC16 (PADRÃO BR CODE) =====
        function crc16(hex) {
            let crc = 0xFFFF;
            const bytes = [];
            for (let i = 0; i < hex.length; i += 2) {
                bytes.push(parseInt(hex.substr(i, 2), 16));
            }
            for (let i = 0; i < bytes.length; i++) {
                crc ^= bytes[i] << 8;
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x8000) {
                        crc = (crc << 1) ^ 0x1021;
                    } else {
                        crc = crc << 1;
                    }
                    crc &= 0xFFFF;
                }
            }
            return crc.toString(16).toUpperCase().padStart(4, '0');
        }

        // ===== FUNÇÃO PARA CRIAR CAMPOS COM TAMANHO =====
        function criarCampo(id, valor) {
            const str = String(valor);
            const len = String(str.length).padStart(2, '0');
            return id + len + str;
        }

        // ===== CONSTROI PAYLOAD =====
        let payload = '';

        // 1. Payload Format Indicator (ID 00) - fixo
        payload += '000201';

        // 2. Merchant Account Information (ID 26)
        let gui = '0014br.gov.bcb.pix';
        let chaveFormatada = '01' + String(chave.length).padStart(2, '0') + chave;
        let merchantInfo = gui + chaveFormatada;
        payload += criarCampo('26', merchantInfo);

        // 3. Merchant Category Code (ID 52) - fixo
        payload += '52040000';

        // 4. Transaction Currency (ID 53) - fixo BRL = 986
        payload += '5303986';

        // 5. Transaction Amount (ID 54)
        const amount = valor.toFixed(2);
        payload += criarCampo('54', amount);

        // 6. Country Code (ID 58) - fixo BR
        payload += '5802BR';

        // 7. Merchant Name (ID 59)
        const nomeLimpo = nome.substring(0, 25);
        payload += criarCampo('59', nomeLimpo);

        // 8. Merchant City (ID 60)
        const cidadeLimpa = cidade.substring(0, 15);
        payload += criarCampo('60', cidadeLimpa);

        // 9. Additional Data Field (ID 62)
        const ref = '***';
        const campo05 = criarCampo('05', ref);
        payload += criarCampo('62', campo05);

        // 10. CRC16 (ID 63) - calculado após todo o payload
        const crc = crc16(payload + '6304');
        payload += '6304' + crc;

        return payload;
    }

    // ========== FUNÇÃO PARA GERAR QR CODE VIA API ==========
    function gerarQRCodeAPI(texto, elemento) {
        const url = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(texto);
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'QR Code PIX';
        img.style.width = '200px';
        img.style.height = '200px';
        img.onerror = function() {
            elemento.innerHTML = '<span class="erro">❌ Erro ao carregar QR Code. Recarregue a página.</span>';
        };
        elemento.innerHTML = '';
        elemento.appendChild(img);
        return true;
    }

    // ========== CARREGAR DADOS ==========
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        let valor = urlParams.get('valor') || '0.00';
        valor = valor.replace(',', '.');
        const cliente = decodeURIComponent(urlParams.get('cliente') || 'Cliente');
        const chavePix = urlParams.get('chave') || '59591030000162';
        const nomePix = urlParams.get('nome') || 'Syanne Waleska Gomes dos Santos';

        document.getElementById('clienteNome').textContent = 'Olá, ' + cliente + '!';
        document.getElementById('valorPix').textContent = 'R$ ' + valor.replace('.', ',');

        const valorNumerico = parseFloat(valor);
        const codigoPixEl = document.getElementById('codigoPix');
        const qrCodeEl = document.getElementById('qrCode');

        if (isNaN(valorNumerico) || valorNumerico <= 0) {
            codigoPixEl.textContent = '❌ Valor inválido.';
            qrCodeEl.innerHTML = '<span class="erro">Valor inválido</span>';
            return;
        }

        // Gera payload PIX
        const payload = gerarPayloadPIX(chavePix, nomePix, valorNumerico, 'Joinville');
        
        if (!payload) {
            codigoPixEl.textContent = '❌ Erro ao gerar código PIX.';
            qrCodeEl.innerHTML = '<span class="erro">Erro ao gerar</span>';
            return;
        }

        // Exibe o payload
        codigoPixEl.textContent = payload;

        // Gera QR Code usando API
        try {
            gerarQRCodeAPI(payload, qrCodeEl);
        } catch (e) {
            qrCodeEl.innerHTML = '<span class="erro">Erro ao gerar QR Code</span>';
            console.error('Erro QR Code:', e);
        }
    });

    // ========== FUNÇÃO COPIAR ==========
    function copiarPix() {
        const codigo = document.getElementById('codigoPix').textContent;
        if (!codigo || codigo.includes('⏳') || codigo.includes('Erro') || codigo.includes('inválido')) {
            alert('⚠️ Código PIX indisponível. Tente novamente.');
            return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(codigo).then(() => {
                const btn = document.getElementById('btnCopiar');
                btn.textContent = '✅ Copiado!';
                btn.classList.add('copiado');
                setTimeout(() => {
                    btn.textContent = '📋 Copiar código PIX';
                    btn.classList.remove('copiado');
                }, 3000);
            }).catch(() => {
                copiarFallback(codigo);
            });
        } else {
            copiarFallback(codigo);
        }
    }

    function copiarFallback(codigo) {
        const textarea = document.createElement('textarea');
        textarea.value = codigo;
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            alert('✅ Código copiado!');
        } catch (e) {
            alert('⚠️ Selecione o código acima e copie manualmente.');
        }
        document.body.removeChild(textarea);
    }
  </script>
</body>
</html>
