<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pagamento - Studio Waleska</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-pix@1.0.0/dist/qrcode-pix.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #f8f0e7, #f0e6dc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      max-width: 450px;
      width: 100%;
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo { font-family: 'Dancing Script', cursive; font-size: 32px; color: #d4af37; margin-bottom: 5px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
    .cliente { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 5px; }
    .valor { font-size: 36px; font-weight: 700; color: #d4af37; margin: 10px 0 20px; }
    .qr-code {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid #f0ece6;
      margin: 0 auto 20px;
      width: 220px;
      height: 220px;
    }
    #qrCode { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; }
    #qrCode img, #qrCode canvas { max-width: 100%; max-height: 100%; }
    .codigo-area {
      background: #f5f0ea;
      padding: 14px;
      border-radius: 12px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 12px;
      font-family: monospace;
      color: #333;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      border: 1px solid #e0ddd8;
    }
    .btn-copiar {
      background: #d4af37;
      color: #fff;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      margin-top: 5px;
    }
    .btn-copiar:hover { background: #b8942a; transform: scale(1.02); }
    .btn-copiar.copiado { background: #4caf50; }
    .instrucoes { color: #777; font-size: 13px; margin-top: 15px; line-height: 1.6; }
    .instrucoes strong { color: #333; }
    .footer { margin-top: 20px; font-size: 12px; color: #aaa; border-top: 1px solid #eee; padding-top: 15px; }
    .carregando { color: #999; font-size: 14px; padding: 20px; }
    .erro { color: #c0392b; font-size: 14px; padding: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✨ Studio Waleska</div>
    <div class="subtitle">Pagamento via PIX</div>
    <div class="cliente" id="clienteNome">Cliente</div>
    <div class="valor" id="valorPix">R$ 0,00</div>
    <div class="qr-code"><div id="qrCode"><span class="carregando">⏳ Gerando QR Code...</span></div></div>
    <div class="codigo-area" id="codigoPix">⏳ Gerando código PIX...</div>
    <button class="btn-copiar" id="btnCopiar" onclick="copiarPix()">📋 Copiar código PIX</button>
    <div class="instrucoes">
      1. Copie o código acima<br>
      2. Abra o app do seu banco<br>
      3. Cole na opção <strong>"PIX Copia e Cola"</strong><br>
      4. Confirme o pagamento
    </div>
    <div class="footer">Qualquer dúvida, fale com Waleska pelo WhatsApp</div>
  </div>

  <script>
    // ========== GERADOR MANUAL DE PAYLOAD (SEM CAMPO 62) ==========
    function gerarPayloadManual(chave, nome, valor, cidade) {
      function crc16(hex) {
        let crc = 0xFFFF;
        const bytes = [];
        for (let i = 0; i < hex.length; i += 2) {
          bytes.push(parseInt(hex.substr(i, 2), 16));
        }
        for (let i = 0; i < bytes.length; i++) {
          crc ^= bytes[i] << 8;
          for (let j = 0; j < 8; j++) {
            if (crc & 0x8000) {
              crc = (crc << 1) ^ 0x1021;
            } else {
              crc = crc << 1;
            }
            crc &= 0xFFFF;
          }
        }
        return crc.toString(16).toUpperCase().padStart(4, '0');
      }

      function criarCampo(id, valor) {
        const str = String(valor);
        const len = String(str.length).padStart(2, '0');
        return id + len + str;
      }

      function limparTexto(texto, max) {
        return texto
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-zA-Z0-9 ]/g, '')
          .trim()
          .substring(0, max) || 'Studio';
      }

      const nomeLimpo = limparTexto(nome, 23);
      const cidadeLimpa = limparTexto(cidade, 15);
      const chaveLimpa = chave.replace(/\D/g, '');
      const tipoChave = chaveLimpa.length === 14 ? '02' : '01';

      let payload = '000201';
      const gui = '0014br.gov.bcb.pix';
      const chaveFormatada = tipoChave + String(chaveLimpa.length).padStart(2, '0') + chaveLimpa;
      const merchantInfo = gui + chaveFormatada;
      payload += criarCampo('26', merchantInfo);
      payload += '52040000';
      payload += '5303986';
      payload += criarCampo('54', valor.toFixed(2));
      payload += '5802BR';
      payload += criarCampo('59', nomeLimpo);
      payload += criarCampo('60', cidadeLimpa);
      // CAMPO 62 REMOVIDO – compatível com a Caixa
      // payload += '6200'; // Opcional: campo vazio
      const crc = crc16(payload + '6304');
      payload += '6304' + crc;
      return payload;
    }

    // ========== GERAR QR CODE LOCAL ==========
    function gerarQRCodeLocal(texto, elemento) {
      if (typeof QRCode === 'undefined') {
        elemento.innerHTML = '<span class="erro">Biblioteca QRCode não carregada.</span>';
        return false;
      }
      try {
        elemento.innerHTML = '';
        new QRCode(elemento, {
          text: texto,
          width: 200,
          height: 200,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
        return true;
      } catch (e) {
        elemento.innerHTML = '<span class="erro">Erro: ' + e.message + '</span>';
        return false;
      }
    }

    // ========== CARREGAR DADOS ==========
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      let valor = urlParams.get('valor') || '0.00';
      valor = valor.replace(',', '.');
      const cliente = decodeURIComponent(urlParams.get('cliente') || 'Cliente');
      const chavePix = urlParams.get('chave') || '59591030000162';
      const nomePix = urlParams.get('nome') || 'Syanne Waleska Gomes dos Santos';

      document.getElementById('clienteNome').textContent = 'Olá, ' + cliente + '!';
      document.getElementById('valorPix').textContent = 'R$ ' + valor.replace('.', ',');

      const valorNumerico = parseFloat(valor);
      const codigoPixEl = document.getElementById('codigoPix');
      const qrCodeEl = document.getElementById('qrCode');

      if (isNaN(valorNumerico) || valorNumerico <= 0) {
        codigoPixEl.textContent = '❌ Valor inválido.';
        qrCodeEl.innerHTML = '<span class="erro">Valor inválido</span>';
        return;
      }

      let payload = null;

      // Tenta gerar com a biblioteca qrcode-pix (se disponível)
      try {
        if (typeof QRCodePix !== 'undefined' && QRCodePix.generate) {
          payload = QRCodePix.generate({
            pixKey: chavePix,
            merchantName: nomePix,
            amount: valorNumerico.toFixed(2),
            city: 'Joinville'
          });
        }
      } catch (e) { /* fallback */ }

      // Se falhou, usa o gerador manual SEM o campo 62
      if (!payload) {
        payload = gerarPayloadManual(chavePix, nomePix, valorNumerico, 'Joinville');
      }

      if (!payload) {
        codigoPixEl.textContent = '❌ Erro ao gerar código PIX.';
        qrCodeEl.innerHTML = '<span class="erro">Erro ao gerar</span>';
        return;
      }

      codigoPixEl.textContent = payload;
      gerarQRCodeLocal(payload, qrCodeEl);
    });

    // ========== COPIAR ==========
    function copiarPix() {
      const codigo = document.getElementById('codigoPix').textContent;
      if (!codigo || codigo.includes('⏳') || codigo.includes('Erro') || codigo.includes('inválido')) {
        alert('⚠️ Código PIX indisponível. Tente novamente.');
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(codigo).then(() => {
          const btn = document.getElementById('btnCopiar');
          btn.textContent = '✅ Copiado!';
          btn.classList.add('copiado');
          setTimeout(() => {
            btn.textContent = '📋 Copiar código PIX';
            btn.classList.remove('copiado');
          }, 3000);
        }).catch(() => copiarFallback(codigo));
      } else {
        copiarFallback(codigo);
      }
    }

    function copiarFallback(codigo) {
      const textarea = document.createElement('textarea');
      textarea.value = codigo;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        alert('✅ Código copiado!');
      } catch (e) {
        alert('⚠️ Selecione o código acima e copie manualmente.');
      }
      document.body.removeChild(textarea);
    }
  </script>
</body>
</html>
